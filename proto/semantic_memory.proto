syntax = "proto3";
package semantic_memory;

service SemanticMemory {
  rpc Embedding(EmbeddingRequest) returns (EmbeddingResponse);
  rpc Rerank(RerankRequest) returns (RerankResponse);
  rpc RerankQwen(RerankRequest) returns (RerankResponse);
  rpc RetrieveAndRerank(RetrieveAndRerankRequest) returns (RetrieveAndRerankResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message EmbeddingRequest {
  repeated string texts = 1;
  bool normalize = 2;
}

message EmbeddingResponse {
  repeated float embeddings = 1;
  int32 dimension = 2;
}

message RerankRequest {
  string query = 1;
  repeated string documents = 2;
  int32 top_k = 3;
  string instruction = 4;
}

message RerankResponse {
  repeated RankedDocument results = 1;
}

message RankedDocument {
  int32 index = 1;
  string text = 2;
  float score = 3;
}

message RetrieveAndRerankRequest {
  string query = 1;
  repeated string documents = 2;
  int32 top_k = 3;
  int32 retrieve_top_k = 4;
}

message RetrieveAndRerankResponse {
  repeated RankedDocument results = 1;
  float total_latency_ms = 2;
}

message HealthRequest {}
message HealthResponse {
  bool healthy = 1;
  string version = 2;
}
